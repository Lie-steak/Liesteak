<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">


  <title><data:blog.title/></title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial;
}

/* Header */
header {
  background: #1e293b;
  color: white;
  padding: 15px 40px;
  display: flex;
  justify-content: space-between;
}

header a {
  color: white;
  text-decoration: none;
  margin-left: 15px;
}

/* Hero */
.hero {
  height: 80vh;
  background: url('https://images.unsplash.com/photo-1568605114967-8130f3a36994') center/cover;
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
  text-align: center;
}

.hero h1 {
  font-size: 40px;
  margin-bottom: 15px;
}

.search-box {
  margin-top: 20px;
}

.search-box input, .search-box button {
  padding: 10px;
  margin: 5px;
  border: none;
}

.search-box button {
  background: #22c55e;
  color: white;
  cursor: pointer;
}

/* Properties */
.properties {
  padding: 40px;
}

.properties h2 {
  margin-bottom: 20px;
}

.grid {
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
}

.card {
  width: 300px;
  border: 1px solid #ddd;
  border-radius: 10px;
  overflow: hidden;
}

.card img {
  width: 100%;
}

.card-body {
  padding: 15px;
}

/* Footer */
footer {
  background: #1e293b;
  color: white;
  text-align: center;
  padding: 20px;
  margin-top: 40px;
}
</style>

</head>
<body>

<header>
  <h2>My Real Estate</h2>
  <div>
    <a href="#">Home</a>
    <a href="#">Properties</a>
    <a href="#">Contact</a>
  </div>
</header>

<section class="hero">
  <div>
    <h1>Find Your Dream Home</h1>
    <p>Buy & Sell properties easily</p>

    <div class="search-box">
      <input type="text" placeholder="City">
      <input type="number" placeholder="Price">
      <button>Search</button>
    </div>
  </div>
</section>

<section class="properties">
  <h2>Latest Properties</h2>

  <div class="grid">

    <div class="card">
      <img src="https://images.unsplash.com/photo-1570129477492-45c003edd2be">
      <div class="card-body">
        <h3>Modern House</h3>
        <p>3 Rooms - $50,000</p>
      </div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1560448204-e02f11c3d0e2">
      <div class="card-body">
        <h3>Luxury Villa</h3>
        <p>5 Rooms - $120,000</p>
      </div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1507089947368-19c1da9775ae">
      <div class="card-body">
        <h3>Small Apartment</h3>
        <p>2 Rooms - $30,000</p>
      </div>
    </div>

  </div>
</section>

<footer>
  <p>© 2026 Real Estate Website</p>
</footer>

</body>
</html>
